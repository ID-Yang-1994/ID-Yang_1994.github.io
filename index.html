<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人作品集</title>
    <style>
        /* CSS 樣式：負責網頁外觀 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: #f4f4f4;
        }

        header {
            background: #2c3e50;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        section {
            background: #fff;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .project-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: #3498db;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>你好，我是 [你的名字]</h1>
        <p>一位熱愛設計與開發的創意工作者</p>
    </header>

    <div class="container">
        <!-- 關於我 -->
        <section id="about">
            <h2>關於我</h2>
            <p>這裡可以寫下你的簡介。例如：我專注於前端開發，喜歡將複雜的問題簡化為優雅的解決方案。</p>
        </section>

        <!-- 作品集區塊 -->
        <section id="projects">
            <h2>我的作品</h2>
            <div class="project-grid">
                <div class="project-card">
                    <h3>專案 A</h3>
                    <p>這是一個關於網頁設計的專案，解決了使用者體驗的問題。</p>
                </div>
                <div class="project-card">
                    <h3>專案 B</h3>
                    <p>這是一個行動裝置 App 的介面設計，強調極簡風格。</p>
                </div>
                <div class="project-card">
                    <h3>專案 C</h3>
                    <p>後端系統優化專案，提升了 50% 的運算效率。</p>
                </div>
            </div>
        </section>

        <!-- 聯絡方式 -->
        <section id="contact">
            <h2>聯絡我</h2>
            <p>Email: yourname@example.com</p>
            <p>LinkedIn / GitHub: @yourusername</p>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 [你的名字]. 版權所有.</p>
    </footer>

</body>
</html>
