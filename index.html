<!DOCTYPE html> <!-- 宣告這是一個 HTML5 文件 -->
<html lang="zh-Hant"> <!-- 設定網頁主要語言為繁體中文 -->
<head> <!-- 網頁的頭部，放置後台資訊與設定，不會顯示在頁面上 -->
    <meta charset="UTF-8"> <!-- 設定文字編碼為 UTF-8，確保各國文字不亂碼 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 讓網頁寬度等於裝置寬度，是「響應式設計」的關鍵 -->
    <title>個人網頁</title> <!-- 顯示在瀏覽器分頁上的標題 -->
    <style> <!-- 開始撰寫 CSS 樣式 -->
        /* CSS 樣式：負責網頁外觀 */
        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif; /* 設定網頁字體 */
            line-height: 1.6; /* 設定行高，讓文字閱讀不擁擠 */
            margin: 0; /* 清除瀏覽器預設的邊距 */
            color: #333; /* 設定預設文字顏色為深灰色 */
            background-color: #f4f4f4; /* 設定網頁背景顏色為淺灰色 */
        }

        header { 
            background: #2c3e50; /* 設定頁首背景為深藍色 */
            color: #fff; /* 設定頁首文字顏色為白色 */
            padding: 2rem; /* 設定頁首內部的留白距離 */
            text-align: center; /* 讓頁首內容置中 */
        }

        .container { 
            max-width: 1000px; /* 限制內容最大寬度為 1000 像素 */
            margin: 2rem auto; /* 讓容器區塊上下留白、左右自動置中 */
            padding: 0 20px; /* 讓容器左右留一點點邊界，手機看才不會貼邊 */
        }

        section { 
            background: #fff; /* 區塊背景設定為白色 */
            padding: 2rem; /* 區塊內留白 */
            margin-bottom: 2rem; /* 每個區塊下方的間隔 */
            border-radius: 8px; /* 區塊邊角圓角化 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* 加入淡淡的陰影增加層次感 */
        }

        h2 { 
            color: #2c3e50; /* 設定標題顏色 */
            border-bottom: 2px solid #eee; /* 標題下方的淺灰色裝飾線 */
            padding-bottom: 10px; /* 標題文字與下底線的距離 */
        }

        .project-grid { 
            display: grid; /* 開啟網格佈局模式 */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* 自動根據寬度排列卡片數量，最少 250px 一格 */
            gap: 20px; /* 設定卡片之間的間隙距離 */
        }

        .project-card { 
            border: 1px solid #ddd; /* 卡片外框線 */
            padding: 15px; /* 卡片內部留白 */
            border-radius: 5px; /* 卡片邊角圓角 */
            transition: transform 0.3s ease; /* 設定動畫過渡效果，讓動作更平滑 */
        }

        .project-card:hover { 
            transform: translateY(-5px); /* 當滑鼠移上去時，卡片向上漂浮 5 像素 */
            border-color: #3498db; /* 滑鼠移上去時邊框變藍色 */
        }

        footer { 
            text-align: center; /* 頁尾文字置中 */
            padding: 2rem; /* 頁尾留白 */
            color: #777; /* 頁尾文字設定為淡灰色 */
        }
    </style> <!-- CSS 結束 -->
</head>


<body> <!-- 網頁的主體，所有顯示在螢幕上的內容都放在這 -->

    <header> <!-- 頁首區塊 -->
        <h1>Hi I am Emi</h1>
        <p>An creator </p>
    </header>

    <div class="container">
        <section id="about"> 
            <h2>About Me</h2>
            <p>簡介內容</p>
        </section>
        
        <section id="projects"> 
            <h2>Projects</h2>
            <div class="project-grid">
                <div class="project-card">
                    <h3>Project A</h3>
                    <p>這是一個關於網頁設計的專案，解決了使用者體驗的問題。</p>
                </div>
                <div class="project-card">
                    <h3>Project B</h3>
                    <p>這是一個行動裝置 App 的介面設計，強調極簡風格。</p>
                </div>
                <div class="project-card"> <!-- 作品卡片 3 -->
                    <h3>Project C</h3>
                    <p>後端系統優化專案，提升了 50% 的運算效率。</p>
                </div>
            </div>
        </section>

        <section id="contact"> 
            <h2>Content Me</h2>
            <p>Email: yourname@example.com</p>
            <p>LinkedIn / GitHub: @yourusername</p>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 [你的名字]. 版權所有.</p>
    </footer>

</body>
</html> <!-- HTML 文件結束 -->
